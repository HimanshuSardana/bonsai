<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Himanshu's Git Server</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #ffffff;
    --surface:     #fafafa;
    --border:      #eaeaea;
    --border-hover:#d2d2d2;
    --text:        #111111;
    --secondary:   #666666;
    --muted:       #999999;
    --accent:      #17c964;
    --font:        'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #0a0a0a;
      --surface:     #141414;
      --border:      #1f1f1f;
      --border-hover:#2d2d2d;
      --text:        #ededed;
      --secondary:   #a0a0a0;
      --muted:       #666666;
      --accent:      #17c964;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }

  /* ── Navigation Bar ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 56px;
    display: flex;
    align-items: center;
  }

  @media (prefers-color-scheme: dark) {
    nav {
      background: rgba(10, 10, 10, 0.85);
    }
  }

  .nav-inner {
    width: 100%;
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }

  .branding {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .branding strong {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .branding-desc {
    font-size: 11.5px;
    color: var(--secondary);
  }

  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-wrap input {
    width: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font);
    font-size: 12px;
    color: var(--text);
    outline: none;
    padding: 6px 42px 6px 10px;
    transition: width 0.15s ease, border-color 0.12s, background-color 0.12s;
  }

  .search-wrap input::placeholder { 
    color: var(--muted); 
  }

  .search-wrap input:focus {
    width: 200px;
    background: var(--bg);
    border-color: var(--border-hover);
  }

  .search-shortcut {
    position: absolute;
    right: 8px;
    font-size: 9px;
    font-weight: 500;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 4px;
    pointer-events: none;
    user-select: none;
    transition: opacity 0.1s ease;
  }

  .search-wrap input:focus + .search-shortcut {
    opacity: 0.5;
  }

  /* ── Page Layout ── */
  .page {
    max-width: 1040px;
    margin: 0 auto;
    padding: 40px 40px 100px;
  }

  /* ── Control Bar ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }

  .tabs {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .tab {
    font-size: 13px;
    font-weight: 400;
    color: var(--secondary);
    cursor: pointer;
    transition: color 0.12s;
    user-select: none;
    position: relative;
    padding: 4px 0;
  }

  .tab:hover {
    color: var(--text);
  }

  .tab.active {
    color: var(--text);
    font-weight: 500;
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -13px;
    left: 0;
    right: 0;
    height: 1px;
    background: var(--text);
  }

  .controls-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat-pill {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.8;
  }

  /* ── Grid/List ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  @media (max-width: 900px) {
    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  /* ── Card/Row ── */
  .card {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: border-color 0.12s ease, background-color 0.12s ease, transform 0.15s;
    animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .card:hover {
    border-color: var(--border-hover);
    background: var(--bg);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }

  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.015em;
  }

  .card-time {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 400;
  }

  .card-msg {
    font-size: 12.5px;
    color: var(--secondary);
    line-height: 1.5;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex-grow: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: auto;
  }

  .card-stat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--muted);
  }

  .card-stat svg { 
    opacity: 0.6; 
  }

  /* ── Empty State ── */
  .empty {
    display: none;
    align-items: center;
    justify-content: center;
    padding: 60px 0;
    font-size: 13px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .empty.visible { display: flex; }

  /* ── Footer ── */
  .page-footer {
    margin-top: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    nav { padding: 0 20px; }
    .page { padding: 30px 20px 60px; }
    .nav-inner { flex-direction: column; align-items: flex-start; gap: 8px; height: auto; padding: 12px 0; }
    nav { height: auto; }
    .search-wrap { width: 100%; }
    .search-wrap input { width: 100%; }
    .search-wrap input:focus { width: 100%; }
    .controls { gap: 12px; }
    .grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="branding">
      <strong>Himanshu's Git Server</strong>
      <span class="branding-desc">Plan B in case GitHub goes down.</span>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search..." autocomplete="off" spellcheck="false">
      <span class="search-shortcut" id="shortcut-hint">⌘K</span>
    </div>
  </div>
</nav>

<div class="page">

  <div class="controls">
    <div class="tabs">
      <div class="tab active" data-tab="all">All</div>
      <div class="tab" data-tab="recent">Recent</div>
    </div>
    <div class="controls-right">
      <div class="stat-pill">
        <span class="stat-dot"></span>
        <span id="open-count">1</span> repos
      </div>
    </div>
  </div>

  <div class="grid" id="grid">
  
    <a class="card" href="bonsai/" data-name="bonsai" data-msg="feat: add click-to-copy clone URL on repo detail pages">
      <div class="card-header">
        <span class="card-name">bonsai</span>
        <span class="card-time" data-ts="1779818228"></span>
      </div>
      <div class="card-msg">feat: add click-to-copy clone URL on repo detail pages</div>
      <div class="card-footer">
        <div class="card-stat">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          1 branch
        </div>
        <div class="card-stat">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          HEAD
        </div>
      </div>
    </a>
  
  </div>

  <div class="empty" id="empty">No matching repositories found.</div>

  <div class="page-footer">
    <span>Himanshu's Git Server</span>
    <span id="footer-count">1 repositories</span>
  </div>
</div>

<script>
  /* relative time helper */
  const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
  function relTime(unix) {
    if (!unix) return '';
    const d = Math.floor((Date.now() - unix * 1000) / 1000);
    if (d < 60)       return rtf.format(-d, 'second');
    if (d < 3600)     return rtf.format(-Math.floor(d / 60), 'minute');
    if (d < 86400)    return rtf.format(-Math.floor(d / 3600), 'hour');
    if (d < 2592000)  return rtf.format(-Math.floor(d / 86400), 'day');
    if (d < 31536000) return rtf.format(-Math.floor(d / 2592000), 'month');
    return rtf.format(-Math.floor(d / 31536000), 'year');
  }
  document.querySelectorAll('[data-ts]').forEach(el => {
    el.textContent = relTime(+el.dataset.ts);
  });

  /* stagger animation delays */
  const cards = [...document.querySelectorAll('.card')];
  cards.forEach((c, i) => { c.style.animationDelay = (i * 25) + 'ms'; });

  /* real-time search */
  const input    = document.getElementById('search');
  const grid     = document.getElementById('grid');
  const empty    = document.getElementById('empty');
  const countEl  = document.getElementById('open-count');
  const footerEl = document.getElementById('footer-count');

  function filter(q) {
    q = q.toLowerCase().trim();
    let n = 0;
    cards.forEach(c => {
      const match = !q
        || c.dataset.name.toLowerCase().includes(q)
        || c.dataset.msg.toLowerCase().includes(q);
      c.style.display = match ? '' : 'none';
      if (match) n++;
    });
    const label = n + ' repositor' + (n === 1 ? 'y' : 'ies');
    countEl.textContent  = n;
    footerEl.textContent = label;
    empty.classList.toggle('visible', n === 0);
    grid.style.display = n === 0 ? 'none' : '';
  }

  input.addEventListener('input', e => filter(e.target.value));

  /* keyboard shortcut listener (Ctrl+K / Cmd+K) */
  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
  const hintEl = document.getElementById('shortcut-hint');
  hintEl.textContent = isMac ? '⌘K' : 'Ctrl+K';

  window.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      if (document.activeElement === input) {
        input.blur();
      } else {
        input.focus();
        input.select();
      }
    }
  });

  // Pressing Escape defocusses search
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      input.blur();
    }
  });

  /* tabs logic */
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (tab.dataset.tab === 'recent') {
        /* sort by timestamp descending */
        const sorted = cards.slice().sort((a, b) =>
          (+b.dataset.ts || 0) - (+a.dataset.ts || 0)
        );
        sorted.forEach(c => grid.appendChild(c));
      } else {
        /* restore DOM order */
        cards.forEach(c => grid.appendChild(c));
      }
      filter(input.value);
    });
  });
</script>

</body>
</html>
