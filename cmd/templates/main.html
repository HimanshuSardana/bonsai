<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Header}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f7f7f8;
    --surface:   #ffffff;
    --border:    #e8e8ec;
    --border-hi: #d0d0d8;
    --text:      #111114;
    --secondary: #6b6b80;
    --muted:     #a0a0b0;
    --accent:    #18a35a;
    --accent2:   #5b5ef4;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    --radius:    10px;
    --font:      'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    background: rgba(247,247,248,0.8);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .header-inner {
    max-width: 1040px;
    margin: 0 auto;
    padding: 0 32px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .breadcrumb svg { color: var(--muted); flex-shrink: 0; }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    color: var(--secondary);
    text-decoration: none;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .back-btn:hover { border-color: var(--border-hi); box-shadow: var(--shadow-md); }

  /* ── Page content ── */
  .page {
    max-width: 1040px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  .page-title {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .page-desc {
    margin-top: 8px;
    font-size: 14px;
    color: var(--secondary);
    max-width: 560px;
    line-height: 1.65;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 28px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .tabs {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--border);
    padding: 3px;
    border-radius: 9px;
  }

  .tab {
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--secondary);
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    user-select: none;
  }

  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .search-wrap input {
    width: 220px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px 7px 32px;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text);
    outline: none;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.12s, box-shadow 0.12s;
  }

  .search-wrap input::placeholder { color: var(--muted); }

  .search-wrap input:focus {
    border-color: var(--border-hi);
    box-shadow: 0 0 0 3px rgba(91,94,244,0.08), var(--shadow-sm);
  }

  /* ── Stats row ── */
  .stats-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--secondary);
    font-weight: 500;
  }

  .stat-pill svg { color: var(--muted); }

  .stat-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .stat-dot.closed { background: var(--muted); }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.15s, border-color 0.15s, transform 0.15s;
    animation: fadeUp 0.25s ease both;
  }

  .card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--border-hi);
    transform: translateY(-1px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .card-time {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .card-msg {
    font-size: 13px;
    color: var(--secondary);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: 40px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-stat {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--secondary);
  }

  .card-stat svg { color: var(--muted); }

  /* progress bar */
  .progress-wrap {
    margin-top: 8px;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: var(--pct, 0%);
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Empty ── */
  .empty {
    display: none;
    align-items: center;
    justify-content: center;
    height: 160px;
    border: 1px dashed var(--border-hi);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--muted);
  }

  .empty.visible { display: flex; }

  /* ── Footer ── */
  .page-footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .page-footer span {
    font-size: 12px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .page { padding: 24px 20px 60px; }
    .header-inner { padding: 0 20px; }
    .search-wrap input { width: 160px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="breadcrumb">
      <a class="back-btn" href="../" title="Back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </a>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      {{.Header}}
    </div>
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Filter repositories…" autocomplete="off" spellcheck="false">
    </div>
  </div>
</header>

<div class="page">

  <h1 class="page-title">{{.Header}}</h1>
  <p class="page-desc">{{.Description}}</p>

  <div class="toolbar">
    <div class="tabs">
      <div class="tab active" data-tab="all">All</div>
      <div class="tab" data-tab="recent">Recent</div>
    </div>
    <div class="toolbar-right">
      <div class="stat-pill">
        <span class="stat-dot"></span>
        <span id="open-count">{{len .Repos}}</span> repositories
      </div>
    </div>
  </div>

  <div class="grid" id="grid">
  {{range .Repos}}
    <a class="card" href="{{.Name}}/" data-name="{{.Name}}" data-msg="{{.LastMessage}}">
      <div class="card-header">
        <span class="card-name">{{.Name}}</span>
        <span class="card-time" data-ts="{{.LastTime}}"></span>
      </div>
      <div class="card-msg">{{.LastMessage}}</div>
      <div class="progress-wrap">
        <div class="progress-bar" style="--pct: 0%"></div>
      </div>
      <div class="card-footer">
        <div class="card-stat">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          1 branch
        </div>
        <div class="card-stat">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          HEAD
        </div>
      </div>
    </a>
  {{end}}
  </div>

  <div class="empty" id="empty">No matching repositories</div>

  <div class="page-footer">
    <span>{{.Header}}</span>
    <span id="footer-count">{{len .Repos}} repositories</span>
  </div>

</div>

<script>
  /* relative time */
  const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
  function relTime(unix) {
    if (!unix) return '';
    const d = Math.floor((Date.now() - unix * 1000) / 1000);
    if (d < 60)       return rtf.format(-d, 'second');
    if (d < 3600)     return rtf.format(-Math.floor(d / 60), 'minute');
    if (d < 86400)    return rtf.format(-Math.floor(d / 3600), 'hour');
    if (d < 2592000)  return rtf.format(-Math.floor(d / 86400), 'day');
    if (d < 31536000) return rtf.format(-Math.floor(d / 2592000), 'month');
    return rtf.format(-Math.floor(d / 31536000), 'year');
  }
  document.querySelectorAll('[data-ts]').forEach(el => {
    el.textContent = relTime(+el.dataset.ts);
  });

  /* stagger */
  const cards = [...document.querySelectorAll('.card')];
  cards.forEach((c, i) => { c.style.animationDelay = (i * 40) + 'ms'; });

  /* search */
  const input    = document.getElementById('search');
  const grid     = document.getElementById('grid');
  const empty    = document.getElementById('empty');
  const countEl  = document.getElementById('open-count');
  const footerEl = document.getElementById('footer-count');

  function filter(q) {
    q = q.toLowerCase().trim();
    let n = 0;
    cards.forEach(c => {
      const match = !q
        || c.dataset.name.toLowerCase().includes(q)
        || c.dataset.msg.toLowerCase().includes(q);
      c.style.display = match ? '' : 'none';
      if (match) n++;
    });
    const label = n + ' repositor' + (n === 1 ? 'y' : 'ies');
    countEl.textContent  = n;
    footerEl.textContent = label;
    empty.classList.toggle('visible', n === 0);
    grid.style.display = n === 0 ? 'none' : '';
  }

  input.addEventListener('input', e => filter(e.target.value));

  /* tabs (cosmetic — wire up to your own logic if needed) */
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      if (tab.dataset.tab === 'recent') {
        /* sort by timestamp descending */
        const sorted = cards.slice().sort((a, b) =>
          (+b.dataset.ts || 0) - (+a.dataset.ts || 0)
        );
        sorted.forEach(c => grid.appendChild(c));
      } else {
        /* restore DOM order */
        cards.forEach(c => grid.appendChild(c));
      }
      filter(input.value);
    });
  });

  /* animate progress bars in on load */
  requestAnimationFrame(() => {
    document.querySelectorAll('.progress-bar').forEach((bar, i) => {
      setTimeout(() => {
        /* placeholder: set a subtle random fill so bars look alive */
        bar.style.setProperty('--pct', (Math.random() * 40 + 5).toFixed(0) + '%');
      }, 200 + i * 40);
    });
  });
</script>

</body>
</html>
