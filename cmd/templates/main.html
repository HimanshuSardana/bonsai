<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Header}}</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2128;
    --border: #30363d;
    --text: #c9d1d9;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --success: #3fb950;
    --radius: 6px;
    --shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", "Cascadia Code", Consolas, monospace;
    background: var(--bg);
    color: var(--text);
    padding: 48px 24px;
    min-height: 100vh;
    line-height: 1.5;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: #f0f6fc;
  }

  .header p {
    color: var(--text-muted);
    margin-top: 8px;
    font-size: 13px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--success));
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
    border-color: var(--accent-dim);
  }

  .card:hover::before {
    opacity: 1;
  }

  .card h2 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card h2::before {
    content: "📁";
    font-size: 14px;
    filter: grayscale(0.3);
  }

  .card .msg {
    font-size: 12px;
    color: var(--text-muted);
    flex: 1;
    line-height: 1.6;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  .card .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
  }

  .card .time {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card .time::before {
    content: "◷";
    color: var(--success);
    font-size: 10px;
  }

  .card .branch {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .card .branch::before {
    content: "⎇";
    color: var(--accent);
    font-size: 10px;
  }

  @media (max-width: 640px) {
    .grid { grid-template-columns: 1fr; }
    body { padding: 24px 16px; }
    .header h1 { font-size: 22px; }
  }
</style>
<base target="_blank">
</head>
<body>
<div class="header">
  <h1>{{.Header}}</h1>
  <p>{{.Description}}</p>
</div>
<div class="grid">
{{range .Repos}}
  <a class="card" href="{{.Name}}/">
    <h2>{{.Name}}</h2>
    <div class="msg">{{.LastMessage}}</div>
    <div class="meta">
      <span class="branch">main</span>
      <span class="time" data-ts="{{.LastTime}}"></span>
    </div>
  </a>
{{end}}
</div>
<script>
const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
function relTime(unix) {
  if (!unix) return '';
  const delta = Math.floor((Date.now() - unix * 1000) / 1000);
  if (delta < 60) return rtf.format(-delta, 'second');
  if (delta < 3600) return rtf.format(-Math.floor(delta / 60), 'minute');
  if (delta < 86400) return rtf.format(-Math.floor(delta / 3600), 'hour');
  if (delta < 2592000) return rtf.format(-Math.floor(delta / 86400), 'day');
  if (delta < 31536000) return rtf.format(-Math.floor(delta / 2592000), 'month');
  return rtf.format(-Math.floor(delta / 31536000), 'year');
}
document.querySelectorAll('[data-ts]').forEach(el => { el.textContent = relTime(el.dataset.ts); });
</script>
</body>
</html>
