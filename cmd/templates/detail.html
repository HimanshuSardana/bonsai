<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #ffffff;
    --surface:     #fafafa;
    --border:      #eaeaea;
    --border-hover:#d2d2d2;
    --text:        #111111;
    --secondary:   #666666;
    --muted:       #999999;
    --accent:      #17c964;
    --accent-sec:  #0070f3;
    --add-bg:      #f0faf4;
    --add-text:    #166534;
    --del-bg:      #fff5f5;
    --del-text:    #991b1b;
    --hunk-bg:     #f4f4f7;
    --hunk-text:   #4b4b7c;
    --font:        'Iosevka Nerd Font', 'Iosevka', 'Iosevka Term', 'JetBrains Mono', 'Fira Code', monospace;
    --mono:        'Iosevka Nerd Font', 'Iosevka', 'Iosevka Term', 'JetBrains Mono', 'Fira Code', monospace;
    --sidebar-w:   320px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:          #0a0a0a;
      --surface:     #141414;
      --border:      #1f1f1f;
      --border-hover:#2d2d2d;
      --text:        #ededed;
      --secondary:   #a0a0a0;
      --muted:       #666666;
      --accent:      #17c964;
      --accent-sec:  #3291ff;
      --add-bg:      #042211;
      --add-text:    #4ade80;
      --del-bg:      #2d0d0d;
      --del-text:    #f87171;
      --hunk-bg:     #111219;
      --hunk-text:   #a5b4fc;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.0125em;
  }

  /* ── Layout ── */
  .layout { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--bg);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex-shrink: 0;
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--secondary);
    text-decoration: none;
    flex-shrink: 0;
    transition: border-color 0.12s, color 0.12s, transform 0.12s;
  }
  .back-btn svg {
    transition: transform 0.12s ease;
  }
  .back-btn:hover { 
    border-color: var(--border-hover); 
    color: var(--text); 
  }
  .back-btn:hover svg {
    transform: translateX(-2px);
  }
  .back-btn:active {
    transform: scale(0.92);
  }

  .sidebar-title {
    font-size: 14.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .sidebar-path {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: -4px;
    padding-left: 34px;
  }

  /* Clone URL Box */
  .clone-url {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--secondary);
    position: relative;
    overflow: hidden;
    margin-top: 2px;
    transition: border-color 0.12s, background-color 0.12s, color 0.12s, transform 0.1s;
    user-select: none;
  }
  .clone-url:hover {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .clone-url:active {
    transform: scale(0.98);
  }
  .clone-url code {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .clone-url svg {
    flex-shrink: 0;
    color: var(--muted);
    transition: color 0.12s;
  }
  .clone-url:hover svg {
    color: var(--secondary);
  }
  .clone-msg {
    position: absolute;
    right: 12px;
    background: var(--text);
    color: var(--bg);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.15s cubic-bezier(0.16, 1, 0.3, 1), transform 0.15s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .clone-url.copied .clone-msg {
    opacity: 1;
    transform: translateY(0);
  }

  /* Commit Filter Search */
  .commit-search {
    position: relative;
    margin-top: 4px;
    display: flex;
    align-items: center;
  }

  .commit-search svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .commit-search input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 42px 7px 30px;
    font-family: var(--font);
    font-size: 11.5px;
    color: var(--text);
    outline: none;
    transition: border-color 0.12s, background-color 0.12s;
  }

  .commit-search input::placeholder { color: var(--muted); }
  .commit-search input:focus { border-color: var(--border-hover); background: var(--bg); }

  .search-shortcut {
    position: absolute;
    right: 8px;
    font-size: 8.5px;
    font-weight: 500;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 4px;
    pointer-events: none;
    user-select: none;
    transition: opacity 0.10s ease;
  }

  .commit-search input:focus + .search-shortcut {
    opacity: 0.4;
  }

  /* Commit List */
  .commit-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
    border-top: 1px solid var(--border);
  }

  .commit-entry {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: transparent;
    position: relative;
    transition: background-color 0.2s cubic-bezier(0.16, 1, 0.3, 1), padding-left 0.2s cubic-bezier(0.16, 1, 0.3, 1), transform 0.1s ease;
    animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  /* Subtle elastic active-press animation */
  .commit-entry:active {
    transform: scale(0.985);
  }

  .commit-entry:hover { 
    background: var(--surface); 
  }

  /* Animated border-draw effect when commit is selected */
  .commit-entry::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--text);
    transform: scaleY(0);
    opacity: 0;
    transform-origin: center;
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease;
  }

  .commit-entry.active {
    background: var(--surface);
    padding-left: 24px; /* subtle shift on selection */
  }

  .commit-entry.active::before {
    transform: scaleY(1);
    opacity: 1;
  }

  .commit-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .commit-hash {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--secondary);
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    transition: border-color 0.2s, color 0.2s;
  }

  .commit-entry.active .commit-hash {
    border-color: var(--border-hover);
    color: var(--text);
  }

  .commit-time {
    font-size: 10.5px;
    color: var(--muted);
    white-space: nowrap;
  }

  .commit-msg {
    font-size: 11.5px;
    color: var(--text);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: font-weight 0.2s;
  }

  .commit-entry.active .commit-msg {
    font-weight: 500;
  }

  /* ── Main Panel ── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }

  /* Sticky Top Bar */
  .main-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  @media (prefers-color-scheme: dark) {
    .main-header {
      background: rgba(10, 10, 10, 0.85);
    }
  }

  .active-hash {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .active-msg {
    font-size: 12.5px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .diff-stats {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10.5px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
  }

  .badge.add { background: var(--add-bg); color: var(--add-text); }
  .badge.del { background: var(--del-bg); color: var(--del-text); }

  .main-body { padding: 32px; display: flex; flex-direction: column; gap: 32px; }

  /* ── Sections ── */
  .section {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .section-title {
    padding: 12px 18px;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title svg { color: var(--muted); }

  .readme {
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.65;
    white-space: pre-wrap;
    padding: 20px;
    color: var(--secondary);
    background: var(--bg);
  }

  /* ── File list ── */
  .file-list {
    list-style: none;
    padding: 4px 0;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--secondary);
    cursor: default;
    transition: background-color 0.15s, color 0.15s;
  }

  .file-item:hover { background: var(--surface); color: var(--text); }
  .file-item svg { color: var(--muted); flex-shrink: 0; }

  /* ── Diff Viewer ── */
  .diff-view {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    overflow-x: auto;
    background: var(--bg);
  }

  .diff-view span {
    transition: background-color 0.1s ease;
  }

  .d-header { color: var(--muted); padding: 4px 18px; display: block; border-bottom: 1px dashed var(--border); }

  .d-hunk {
    display: block;
    padding: 4px 18px;
    background: var(--hunk-bg);
    color: var(--hunk-text);
  }

  .d-add {
    display: block;
    padding: 4px 18px;
    background: var(--add-bg);
    color: var(--add-text);
  }
  .d-add:hover {
    background: var(--border);
  }

  .d-del {
    display: block;
    padding: 4px 18px;
    background: var(--del-bg);
    color: var(--del-text);
  }
  .d-del:hover {
    background: var(--border);
  }

  .d-ctx {
    display: block;
    padding: 4px 18px;
    color: var(--secondary);
  }
  .d-ctx:hover {
    background: var(--surface);
  }

  .diff-empty {
    padding: 48px 18px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font);
  }

  /* ── Custom Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
    .main { height: 60vh; }
    .main-header { padding: 0 20px; }
    .main-body { padding: 20px; gap: 20px; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-top">
        <a class="back-btn" href="../" title="Back to repositories">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </a>
        <span class="sidebar-title">{{.Name}}</span>
      </div>
      <span class="sidebar-path">{{.Path}}</span>
      
      <!-- Safe Copy to Clipboard Utility Trigger -->
      <div class="clone-url" onclick="copyCloneUrl('git clone {{.CloneURL}}', this)">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><polyline points="8 9 12 13 16 9"/><line x1="12" y1="3" x2="12" y2="13"/></svg>
        <code>git clone {{.CloneURL}}</code>
        <span class="clone-msg">Copied!</span>
      </div>

      <div class="commit-search">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="commit-filter" placeholder="Search commits..." autocomplete="off" spellcheck="false">
        <span class="search-shortcut" id="shortcut-hint">⌘K</span>
      </div>
    </div>
    <ul class="commit-list" id="commit-list"></ul>
  </div>

  <!-- Main Panel -->
  <div class="main">
    <div class="main-header">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted)"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/></svg>
      <span class="active-hash" id="active-hash">—</span>
      <span class="active-msg" id="active-msg">Select a commit</span>
      <div class="diff-stats" id="diff-stats"></div>
    </div>

    <div class="main-body">

      {{if .Readme}}
      <div class="section">
        <div class="section-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          README
        </div>
        <div class="readme">{{.Readme}}</div>
      </div>
      {{end}}

      <div class="section">
        <div class="section-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z" opacity="0"/><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
          Files
        </div>
        <ul class="file-list">
          {{range .Files}}
          <li class="file-item">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            {{.}}
          </li>
          {{end}}
        </ul>
      </div>

      <div class="section">
        <div class="section-title">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Diff
        </div>
        <div class="diff-view" id="diff-view">
          <div class="diff-empty">Select a commit from the sidebar</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script id="commits-data" type="application/json">{{.Commits | toJSON}}</script>
<script>
  const commits = JSON.parse(document.getElementById('commits-data').textContent);
  const listEl      = document.getElementById('commit-list');
  const diffView    = document.getElementById('diff-view');
  const activeHash  = document.getElementById('active-hash');
  const activeMsg   = document.getElementById('active-msg');
  const diffStats   = document.getElementById('diff-stats');
  const filterInput = document.getElementById('commit-filter');

  /* Robust iframe-compatible clipboard fallback */
  function copyCloneUrl(text, el) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.select();
    try {
      document.execCommand('copy');
      el.classList.add('copied');
      setTimeout(() => el.classList.remove('copied'), 1500);
    } catch (err) {
      console.warn('Fallback copy failed', err);
    }
    document.body.removeChild(textarea);
  }

  /* relative time helper */
  const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
  function relTime(unix) {
    if (!unix) return '';
    const d = Math.floor((Date.now() - unix * 1000) / 1000);
    if (d < 60)       return rtf.format(-d, 'second');
    if (d < 3600)     return rtf.format(-Math.floor(d / 60), 'minute');
    if (d < 86400)    return rtf.format(-Math.floor(d / 3600), 'hour');
    if (d < 2592000)  return rtf.format(-Math.floor(d / 86400), 'day');
    if (d < 31536000) return rtf.format(-Math.floor(d / 2592000), 'month');
    return rtf.format(-Math.floor(d / 31536000), 'year');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Bind the Ctrl+K / Cmd+K listener
  const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
  const hintEl = document.getElementById('shortcut-hint');
  if (hintEl) {
    hintEl.textContent = isMac ? '⌘K' : 'Ctrl+K';
  }

  window.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      if (document.activeElement === filterInput) {
        filterInput.blur();
      } else {
        filterInput.focus();
        filterInput.select();
      }
    }
  });

  // Escape defocusses the input
  filterInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      filterInput.blur();
    }
  });

  function countDiff(diff) {
    let add = 0, del = 0;
    if (!diff) return { add, del };
    diff.split('\n').forEach(l => {
      if (l.startsWith('+') && !l.startsWith('+++')) add++;
      if (l.startsWith('-') && !l.startsWith('---')) del++;
    });
    return { add, del };
  }

  function renderDiff(diff) {
    if (!diff) return '<div class="diff-empty">No diff for this commit</div>';
    return diff.split('\n').map(line => {
      let cls = 'd-ctx';
      if (line.startsWith('+++') || line.startsWith('---')) cls = 'd-header';
      else if (line.startsWith('@@')) cls = 'd-hunk';
      else if (line.startsWith('+')) cls = 'd-add';
      else if (line.startsWith('-')) cls = 'd-del';
      return '<span class="' + cls + '">' + esc(line) + '</span>';
    }).join('');
  }

  function selectCommit(hash) {
    document.querySelectorAll('.commit-entry').forEach(e => e.classList.remove('active'));
    const el = document.querySelector('[data-hash="' + hash + '"]');
    if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }

    const commit = commits.find(c => c.hash === hash);
    if (!commit) return;

    activeHash.textContent = commit.hash.slice(0, 8);
    activeMsg.textContent  = commit.message;
    diffView.innerHTML     = renderDiff(commit.diff);

    const { add, del } = countDiff(commit.diff);
    diffStats.innerHTML =
      (add ? '<span class="badge add">+' + add + '</span>' : '') +
      (del ? '<span class="badge del">−' + del + '</span>' : '');
  }

  /* build sidebar entries */
  function buildList(items) {
    listEl.innerHTML = '';
    items.forEach((c, i) => {
      const li = document.createElement('li');
      li.className = 'commit-entry';
      li.dataset.hash = c.hash;
      li.style.animationDelay = (i * 15) + 'ms';
      li.innerHTML =
        '<div class="commit-meta">' +
          '<span class="commit-hash">' + esc(c.hash.slice(0, 8)) + '</span>' +
          '<span class="commit-time">' + relTime(c.timestamp) + '</span>' +
        '</div>' +
        '<div class="commit-msg">' + esc(c.message) + '</div>';
      li.addEventListener('click', () => selectCommit(c.hash));
      listEl.appendChild(li);
    });
  }

  buildList(commits);
  if (commits.length) selectCommit(commits[0].hash);

  /* filter */
  filterInput.addEventListener('input', () => {
    const q = filterInput.value.toLowerCase().trim();
    const filtered = q
      ? commits.filter(c => c.message.toLowerCase().includes(q) || c.hash.toLowerCase().includes(q))
      : commits;
    buildList(filtered);
    if (filtered.length) selectCommit(filtered[0].hash);
  });
</script>
</body>
</html>
