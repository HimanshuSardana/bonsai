<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Name}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f7f7f8;
    --surface:   #ffffff;
    --border:    #e8e8ec;
    --border-hi: #d0d0d8;
    --text:      #111114;
    --secondary: #6b6b80;
    --muted:     #a0a0b0;
    --accent:    #18a35a;
    --accent2:   #5b5ef4;
    --add-bg:    #f0faf4;
    --add-text:  #166534;
    --del-bg:    #fff5f5;
    --del-text:  #991b1b;
    --hunk-bg:   #f0f4ff;
    --hunk-text: #3730a3;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
    --radius:    10px;
    --font:      'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:      'Geist Mono', 'SF Mono', monospace;
    --sidebar-w: 300px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .layout { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--bg);
    color: var(--secondary);
    text-decoration: none;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .back-btn:hover { border-color: var(--border-hi); box-shadow: var(--shadow-md); }

  .sidebar-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-path {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .commit-search {
    position: relative;
  }

  .commit-search svg {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .commit-search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 6px 10px 6px 30px;
    font-family: var(--font);
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.12s;
  }

  .commit-search input::placeholder { color: var(--muted); }
  .commit-search input:focus { border-color: var(--border-hi); }

  .commit-list {
    list-style: none;
    overflow-y: auto;
    flex: 1;
  }

  .commit-entry {
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: background 0.1s;
  }

  .commit-entry:hover { background: var(--bg); }

  .commit-entry.active {
    background: #f0f4ff;
    border-left: 2px solid var(--accent2);
    padding-left: 14px;
  }

  .commit-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .commit-hash {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .commit-entry.active .commit-hash {
    background: #e8ecff;
    border-color: #c7ccf7;
    color: var(--accent2);
  }

  .commit-time {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  .commit-msg {
    font-size: 13px;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* sticky top bar */
  .main-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(247,247,248,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 48px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .active-hash {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 5px;
  }

  .active-msg {
    font-size: 13px;
    color: var(--secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .diff-stats {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 5px;
    font-weight: 500;
  }

  .badge.add { background: var(--add-bg); color: var(--add-text); }
  .badge.del { background: var(--del-bg); color: var(--del-text); }

  .main-body { padding: 20px 24px 48px; display: flex; flex-direction: column; gap: 20px; }

  /* ── Readme ── */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .section-title {
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 500;
    color: var(--secondary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .section-title svg { color: var(--muted); }

  .readme {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    padding: 16px;
    color: var(--secondary);
  }

  /* ── File tree ── */
  .file-list {
    list-style: none;
    padding: 8px 0;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--secondary);
    cursor: default;
    transition: background 0.1s;
  }

  .file-item:hover { background: var(--bg); }
  .file-item svg { color: var(--muted); flex-shrink: 0; }

  /* ── Diff ── */
  .diff-view {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
  }

  .d-header { color: var(--muted); padding: 2px 16px; display: block; }

  .d-hunk {
    display: block;
    padding: 2px 16px;
    background: var(--hunk-bg);
    color: var(--hunk-text);
  }

  .d-add {
    display: block;
    padding: 2px 16px;
    background: var(--add-bg);
    color: var(--add-text);
  }

  .d-del {
    display: block;
    padding: 2px 16px;
    background: var(--del-bg);
    color: var(--del-text);
  }

  .d-ctx {
    display: block;
    padding: 2px 16px;
    color: var(--secondary);
  }

  .diff-empty {
    padding: 32px 16px;
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 700px) {
    :root { --sidebar-w: 220px; }
  }
</style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-top">
        <a class="back-btn" href="../" title="Back to repositories">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </a>
        <span class="sidebar-title">{{.Name}}</span>
      </div>
      <span class="sidebar-path">{{.Path}}</span>
      <div class="commit-search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="commit-filter" placeholder="Filter commits…" autocomplete="off" spellcheck="false">
      </div>
    </div>
    <ul class="commit-list" id="commit-list"></ul>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="main-header">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted)"><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/></svg>
      <span class="active-hash" id="active-hash">—</span>
      <span class="active-msg" id="active-msg">Select a commit</span>
      <div class="diff-stats" id="diff-stats"></div>
    </div>

    <div class="main-body">

      {{if .Readme}}
      <div class="section">
        <div class="section-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          README
        </div>
        <div class="readme">{{.Readme}}</div>
      </div>
      {{end}}

      <div class="section">
        <div class="section-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z" opacity="0"/><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
          Files
        </div>
        <ul class="file-list">
          {{range .Files}}
          <li class="file-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            {{.}}
          </li>
          {{end}}
        </ul>
      </div>

      <div class="section">
        <div class="section-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Diff
        </div>
        <div class="diff-view" id="diff-view">
          <div class="diff-empty">Select a commit from the sidebar</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script id="commits-data" type="application/json">{{.Commits | toJSON}}</script>
<script>
  const commits = JSON.parse(document.getElementById('commits-data').textContent);
  const listEl      = document.getElementById('commit-list');
  const diffView    = document.getElementById('diff-view');
  const activeHash  = document.getElementById('active-hash');
  const activeMsg   = document.getElementById('active-msg');
  const diffStats   = document.getElementById('diff-stats');
  const filterInput = document.getElementById('commit-filter');

  /* relative time */
  const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });
  function relTime(unix) {
    if (!unix) return '';
    const d = Math.floor((Date.now() - unix * 1000) / 1000);
    if (d < 60)       return rtf.format(-d, 'second');
    if (d < 3600)     return rtf.format(-Math.floor(d / 60), 'minute');
    if (d < 86400)    return rtf.format(-Math.floor(d / 3600), 'hour');
    if (d < 2592000)  return rtf.format(-Math.floor(d / 86400), 'day');
    if (d < 31536000) return rtf.format(-Math.floor(d / 2592000), 'month');
    return rtf.format(-Math.floor(d / 31536000), 'year');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function countDiff(diff) {
    let add = 0, del = 0;
    if (!diff) return { add, del };
    diff.split('\n').forEach(l => {
      if (l.startsWith('+') && !l.startsWith('+++')) add++;
      if (l.startsWith('-') && !l.startsWith('---')) del++;
    });
    return { add, del };
  }

  function renderDiff(diff) {
    if (!diff) return '<div class="diff-empty">No diff for this commit</div>';
    return diff.split('\n').map(line => {
      let cls = 'd-ctx';
      if (line.startsWith('+++') || line.startsWith('---')) cls = 'd-header';
      else if (line.startsWith('@@')) cls = 'd-hunk';
      else if (line.startsWith('+')) cls = 'd-add';
      else if (line.startsWith('-')) cls = 'd-del';
      return '<span class="' + cls + '">' + esc(line) + '</span>';
    }).join('');
  }

  function selectCommit(hash) {
    document.querySelectorAll('.commit-entry').forEach(e => e.classList.remove('active'));
    const el = document.querySelector('[data-hash="' + hash + '"]');
    if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }

    const commit = commits.find(c => c.hash === hash);
    if (!commit) return;

    activeHash.textContent = commit.hash.slice(0, 8);
    activeMsg.textContent  = commit.message;
    diffView.innerHTML     = renderDiff(commit.diff);

    const { add, del } = countDiff(commit.diff);
    diffStats.innerHTML =
      (add ? '<span class="badge add">+' + add + '</span>' : '') +
      (del ? '<span class="badge del">−' + del + '</span>' : '');
  }

  /* build sidebar entries */
  function buildList(items) {
    listEl.innerHTML = '';
    items.forEach((c, i) => {
      const li = document.createElement('li');
      li.className = 'commit-entry';
      li.dataset.hash = c.hash;
      li.style.animationDelay = (i * 25) + 'ms';
      li.innerHTML =
        '<div class="commit-meta">' +
          '<span class="commit-hash">' + esc(c.hash.slice(0, 8)) + '</span>' +
          '<span class="commit-time">' + relTime(c.timestamp) + '</span>' +
        '</div>' +
        '<div class="commit-msg">' + esc(c.message) + '</div>';
      li.addEventListener('click', () => selectCommit(c.hash));
      listEl.appendChild(li);
    });
  }

  buildList(commits);
  if (commits.length) selectCommit(commits[0].hash);

  /* filter */
  filterInput.addEventListener('input', () => {
    const q = filterInput.value.toLowerCase().trim();
    const filtered = q
      ? commits.filter(c => c.message.toLowerCase().includes(q) || c.hash.toLowerCase().includes(q))
      : commits;
    buildList(filtered);
    if (filtered.length) selectCommit(filtered[0].hash);
  });
</script>
</body>
</html>
